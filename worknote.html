<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作管理系统</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
  }
  body {
    background: #f4f6f8;
    padding: 20px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  .title {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .nav {
    display: flex;
    gap: 8px;
    margin-top: 15px;
    flex-wrap: wrap;
  }
  .nav button {
    padding: 8px 14px;
    border: none;
    background: #eef2f7;
    border-radius: 8px;
    cursor: pointer;
  }
  .nav button.active {
    background: #3b82f6;
    color: white;
  }
  .page {
    background: white;
    padding: 22px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: none;
  }
  .page.active {
    display: block;
  }
  .card {
    margin-bottom: 16px;
  }
  h2 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #222;
  }
  textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin: 10px 0;
    resize: none;
  }
  button {
    padding: 8px 16px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 6px;
  }
  .btn-green {
    background: #10b981;
  }
  .record {
    background: #f9fafb;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
    white-space: pre-line;
  }
  .project {
    padding: 12px;
    background: #f9fafb;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .project-detail {
    margin-top: 6px;
    padding: 8px;
    background: white;
    border-radius: 6px;
    display: none;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  table th, table td {
    border: 1px solid #eee;
    padding: 8px;
    text-align: left;
  }
  table th {
    background: #f9fafb;
  }
</style>
</head>

<body>
<div class="container">
  <div class="title">
    <h1>工作管理系统</h1>
    <div class="nav">
      <button onclick="show('report')" class="active">工作报告</button>
      <button onclick="show('projects')">项目管理</button>
      <button onclick="show('contacts')">通讯录</button>
      <button onclick="show('ledger')">台账管理</button>
      <button onclick="show('policy')">政策法规</button>
      <button onclick="show('org')">组织架构</button>
    </div>
  </div>

  <!-- 工作报告 -->
  <div id="report" class="page active">
    <h2>每日工作记录 → 自动生成月报</h2>
    <textarea id="workContent" placeholder="输入今日工作内容…"></textarea>
    <button onclick="save()">💾 保存记录</button>
    <button class="btn-green" onclick="genReport()">📝 生成月报</button>
    <h3>今日记录</h3>
    <div id="todayRecord" class="record">暂无记录</div>
    <h3>月度报告</h3>
    <div id="monthReport" class="record" style="background:#eef7ff"></div>
  </div>

  <!-- 项目管理 -->
  <div id="projects" class="page">
    <h2>项目管理</h2>
    <div class="project" onclick="toggle(this)">
      <div>Singfar 项目</div>
      <div class="project-detail">DBS融资、股权质押、章程修改、提款安排</div>
    </div>
    <div class="project" onclick="toggle(this)">
      <div>GR 欠款追偿（美国）</div>
      <div class="project-detail">涉案：763.69万美元｜进展：和解磋商、仲裁筹备</div>
    </div>
  </div>

  <!-- 通讯录 -->
  <div id="contacts" class="page">
    <h2>通讯录</h2>
    <table>
      <tr><th>部门</th><th>姓名</th><th>电话</th></tr>
      <tr><td>经理层</td><td>冯雄雅</td><td>13910663326</td></tr>
      <tr><td>市场一部</td><td>李嘉图</td><td>18521721955</td></tr>
    </table>
  </div>

  <!-- 台账 -->
  <div id="ledger" class="page">
    <h2>台账管理</h2>
    <p>合同审批台账、授权台账、董事签字、律师费</p>
  </div>

  <!-- 政策 -->
  <div id="policy" class="page">
    <h2>政策法规</h2>
    <p>FuelEU、EU ETS、美国301政策</p>
  </div>

  <!-- 组织架构 -->
  <div id="org" class="page">
    <h2>组织架构</h2>
    <p>国资委 → 中国船舶集团 → 中国船舶资本 → 中船香港</p>
  </div>

</div>

<script>
// 页面切换（绝对不会空白）
function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// 保存工作
function save() {
  let val = document.getElementById('workContent').value;
  localStorage.setItem('mywork', val);
  document.getElementById('todayRecord').innerText = val || '暂无记录';
  alert('保存成功');
}

// 生成月报
function genReport() {
  let val = localStorage.getItem('mywork') || '';
  if (!val) { alert('请先填写工作内容'); return; }
  let report = '2026年3月工作报告\n\n一、本月工作\n• ' + val.replace(/\n/g, '\n• ') + '\n\n二、重点项目\n• Singfar、GR追偿、船舶出售\n\n三、下月计划';
  document.getElementById('monthReport').innerText = report;
}

// 项目展开/收起
function toggle(el) {
  let detail = el.querySelector('.project-detail');
  detail.style.display = detail.style.display === 'block' ? 'none' : 'block';
}

// 初始化加载
window.onload = function() {
  let val = localStorage.getItem('mywork') || '';
  document.getElementById('todayRecord').innerText = val || '暂无记录';
};
</script>
</body>
</html>
