<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: none; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; margin: 100px auto; }
        .login-container h1 { text-align: center; color: #1a1a2e; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #1a1a2e; }
        .login-btn { width: 100%; padding: 14px; background: #1a1a2e; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        .login-btn:hover { background: #16213e; }
        .error { color: red; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
        #main-content { display: none; }
        .logged-in .login-page { display: none; }
        .logged-in #main-content { display: block; }
        body.logged-in { display: block; background: white; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-page">
        <div class="login-container">
            <h1>🔐 工作管理系统</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
                <p class="error" id="errorMsg">用户名或密码错误</p>
            </form>
        </div>
    </div>
    
    <!-- Main Content (loaded after login) -->
    <iframe id="main-content" src="main.html" style="width: 100%; height: 100vh; border: none;"></iframe>

    <script>
        // 用户配置 - 请修改密码!
        const USERS = {
            "Lucia": "Csic2026!",
            "lucia": "cccc"
        };
        
        // 检查登录状态
        function checkLogin() {
            const isLoggedIn = sessionStorage.getItem('loggedIn');
            const username = sessionStorage.getItem('username');
            if (isLoggedIn === 'true' && username && USERS[username]) {
                document.body.classList.add('logged-in');
                return true;
            }
            return false;
        }
        
        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (USERS[username] && USERS[username] === password) {
                sessionStorage.setItem('loggedIn', 'true');
                sessionStorage.setItem('username', username);
                document.body.classList.add('logged-in');
                document.getElementById('errorMsg').style.display = 'none';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
        
        // 页面加载时检查登录状态
        if (!checkLogin()) {
            document.body.style.display = 'flex';
        }
    </script>
</body>
</html>
